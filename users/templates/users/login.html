{% extends 'base.html' %}

{% block content %}


<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">

    <div class="auth-wrapper w-100" style="max-width: 420px;">

        <!-- HEADER -->
        <div class="auth-header text-center mb-5">

            <!-- APPLYFLOW BRAND -->
            <div class="d-inline-flex align-items-center gap-2 mb-4">

                <!-- LOGO -->
                <svg class="brand-logo-register" viewBox="0 0 24 24" fill="none">

                    <circle cx="6.5" cy="14" r="2" fill="var(--app-success)"/>
                    <circle cx="12" cy="10" r="2" fill="var(--app-success)"/>
                    <circle cx="18" cy="6.5" r="2" fill="var(--app-success)"/>

                    <path d="M6.5 14L12 10L18 6.5"
                          stroke="var(--app-success)"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"/>

                </svg>

                <!-- BRAND NAME -->
                <div class="fw-bold brand-text brand-success">
                    ApplyFlow
                </div>

            </div>

            <h2 class="fw-bold mb-1">
                Welcome Back
            </h2>

            <p class="text-soft mb-0">
                Sign in to continue tracking your applications.
            </p>

        </div>
        
        <!-- LOGIN CARD -->
        <div class="card border-0">

            <div class="card-body p-4 p-lg-5">

                {% if form.errors %}
                <div class="alert alert-danger border-0">
                    Invalid username or password.
                </div>
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label text-soft">
                            Username
                        </label>
                        {{ form.username }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-soft">
                            Password
                        </label>
                        {{ form.password }}
                    </div>

                    <button type="submit" class="btn btn-primary w-100">

                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Sign In

                    </button>

                </form>

            </div>

        </div>

        <!-- FOOTER -->
        <div class="text-center mt-4">

            <span class="text-muted">
                Don't have an account?
            </span>

            <a href="{% url 'register' %}" class="text-decoration-none ms-1">
                Create Account
            </a>

        </div>

    </div>

</div>

{% endblock %}
